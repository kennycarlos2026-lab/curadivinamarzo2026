plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "org.jetbrains.kotlin.android"
    // El Flutter Gradle Plugin debe aplicarse después de los plugins de Android y Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

// Cargar las propiedades de Flutter
def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1" // Valor predeterminado si no se encuentra en local.properties
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0" // Valor predeterminado si no se encuentra en local.properties
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    // 1. Añadimos el namespace (Obligatorio en plantillas nuevas)
    namespace "com.kym.lavozdelacuradivina.radio" 
    
    compileSdkVersion flutter.compileSdkVersion

    defaultConfig {
        applicationId "com.kym.lavozdelacuradivina.radio"
        minSdkVersion 23
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger() 
        versionName flutterVersionName 
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                storePassword = keystoreProperties['storePassword']
            } else {
                // Configuración original (Ruta de Linux) - ¡Fallará en Windows!
                // Crea un archivo android/key.properties para usar rutas relativas seguras.
                storeFile file("/home/user/appradiovoz2026/upload-keystore.jks") 
                storePassword "453691450"
                keyAlias "kennycar"
                keyPassword "453691450" 
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false 
            shrinkResources false 
            signingConfig signingConfigs.release 
        }
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17 
        targetCompatibility JavaVersion.VERSION_17 
    }

    kotlinOptions {
        jvmTarget = "17" 
    }
}

flutter {
    source = "../.." // Ruta hacia el código fuente de Flutter (ajustar si es necesario)
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
